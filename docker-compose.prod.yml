services:
  postgres:
    image: postgis/postgis:16-3.4
    restart: unless-stopped
    environment:
      POSTGRES_DB: sunpath
      POSTGRES_USER: sunpath
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?err}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sunpath"]
      interval: 5s
      timeout: 3s
      retries: 5
    volumes:
      - pg-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      DB_STORE: postgres
      DATABASE_URL: postgres://sunpath:${POSTGRES_PASSWORD:?err}@postgres:5432/sunpath?sslmode=disable
      REDIS_URL: redis://redis:6379/0
      OVERPASS_URL: ${OVERPASS_URL:-https://overpass-api.de/api/interpreter}
      TILE_STYLE_URL: ${TILE_STYLE_URL:-https://demotiles.maplibre.org/style.json}
      LISTEN_ADDR: :8080
      ELEVATION_API_URL: ${ELEVATION_API_URL:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

  migratedb:
    build:
      context: ./backend
      dockerfile: Dockerfile
    entrypoint: ["migratedb"]
    restart: "no"
    environment:
      DB_STORE: postgres
      DATABASE_URL: postgres://sunpath:${POSTGRES_PASSWORD:?err}@postgres:5432/sunpath?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pg-data:
